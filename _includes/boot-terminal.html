<div id="boot-terminal-container" class="boot-terminal-container">
  <div class="boot-terminal">
    <div class="boot-output" id="boot-output"></div>
    <div class="boot-input-line">
      <span class="boot-prompt">➜</span>
      <input 
        type="text" 
        class="boot-input" 
        id="boot-input" 
        placeholder="Type 'start' to begin..."
        autofocus
      >
      <span class="boot-cursor"></span>
    </div>
  </div>
</div>

let currentMessageIndex = 0;
let isBooting = true;

function initBootTerminal() {
  const bootInput = document.getElementById('boot-input');
  const bootOutput = document.getElementById('boot-output');
  const bootTerminal = document.querySelector('.boot-terminal');
  
  if (!bootInput || !bootOutput || !bootTerminal) {
    return;
  }

  // Function to add message to output
  function addBootMessage(message) {
    const line = document.createElement('div');
    line.className = 'boot-line';
    line.textContent = message;
    bootOutput.appendChild(line);
    
    // Auto-scroll to bottom smoothly
    bootTerminal.scrollTop = bootTerminal.scrollHeight;
  }

  // Simulate boot sequence with ~5 second duration
  function simulateBootSequence() {
    if (currentMessageIndex < bootMessages.length) {
      addBootMessage(bootMessages[currentMessageIndex]);
      currentMessageIndex++;
      // Distribute boot messages evenly over ~5000ms
      const delayBetweenMessages = 5000 / bootMessages.length;
      setTimeout(simulateBootSequence, delayBetweenMessages);
    } else {
      isBooting = false;
      bootInput.focus();
    }
  }

  // Start boot sequence
  simulateBootSequence();

  // Handle user input
  bootInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
      const command = bootInput.value.trim().toLowerCase();
      
      addBootMessage(`➜ ${bootInput.value}`);
      bootInput.value = '';
      
      if (command === 'start') {
        addBootMessage('');
        addBootMessage('Initializing desktop environment...');
        addBootMessage('Loading window manager...');
        addBootMessage('Starting file system...');
        addBootMessage('');
        addBootMessage('Desktop ready.');
        addBootMessage('');
        
        setTimeout(() => {
          const bootContainer = document.getElementById('boot-terminal-container');
          if (bootContainer) {
            bootContainer.style.opacity = '0';
            bootContainer.style.pointerEvents = 'none';
          }
          
          const desktop = document.getElementById('os-desktop');
          const taskbar = document.getElementById('os-taskbar');
          if (desktop) desktop.style.display = 'grid';
          if (taskbar) taskbar.style.display = 'flex';
          
          document.body.classList.add('os-desktop-active');
        }, 1500);
      } else if (command === 'help') {
        addBootMessage('Available commands:');
        addBootMessage('  start     - Initialize the desktop environment');
        addBootMessage('  help      - Show this help message');
        addBootMessage('');
      } else if (command.length > 0) {
        addBootMessage(`Command not found: ${command}`);
        addBootMessage('Type "start" to begin or "help" for available commands');
        addBootMessage('');
      }
    }
  });
}

// Initialize when DOM is ready
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initBootTerminal);
} else {
  initBootTerminal();
}
