<!-- OS Desktop Environment -->

<!-- Taskbar -->
<div id="os-taskbar" class="os-taskbar">
  <div class="taskbar-left">
    <div class="taskbar-clock" id="taskbar-clock">00:00:00</div>
  </div>
  
  <div class="taskbar-center">
    <div class="taskbar-windows" id="taskbar-windows"></div>
  </div>
  
  <div class="taskbar-right">
    <div class="taskbar-status">
      <span class="status-indicator" id="status-indicator"></span>
      <span class="status-text">ONLINE</span>
    </div>
  </div>
</div>

<!-- Desktop Area -->
<div id="os-desktop" class="os-desktop">
  <!-- Desktop Icons Container -->
  <div class="desktop-icons" id="desktop-icons"></div>
  
  <!-- Windows Container -->
  <div class="windows-container" id="windows-container"></div>
  
  <!-- Terminal Command Input (bottom right) -->
  <div class="os-terminal-input" id="os-terminal-input">
    <div class="terminal-path" id="terminal-path">~/</div>
    <input 
      type="text" 
      class="terminal-command-input" 
      id="terminal-command-input"
      placeholder="Type command..."
    >
  </div>
</div>

<script>
// ===== DESKTOP ICONS DATA =====
const desktopIcons = [
  { id: 'home', label: 'Home', icon: 'home', x: 60, y: 60 },
  { id: 'blog', label: 'Blog Posts', icon: 'file-text', x: 160, y: 60 },
  { id: 'projects', label: 'Projects', icon: 'folder', x: 260, y: 60 },
  { id: 'about', label: 'About', icon: 'user', x: 360, y: 60 },
  { id: 'research', label: 'Research', icon: 'beaker', x: 460, y: 60 },
  { id: 'gallery', label: 'Gallery', icon: 'image', x: 560, y: 60 },
];

// ===== SVG ICONS (Minimalist Outline Style) =====
const svgIcons = {
  home: `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>`,
  
  'file-text': `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="12" y1="11" x2="12" y2="17"></line><line x1="9" y1="14" x2="15" y2="14"></line></svg>`,
  
  folder: `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>`,
  
  user: `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>`,
  
  beaker: `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 3h15M6 3v16a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V3M9 8h6M9 13h6"></path></svg>`,
  
  image: `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>`,
};

// ===== WINDOW MANAGEMENT =====
class WindowManager {
  constructor() {
    this.windows = new Map();
    this.zIndex = 100;
    this.windowPositions = this.loadWindowPositions();
  }
  
  loadWindowPositions() {
    const saved = localStorage.getItem('os-window-positions');
    return saved ? JSON.parse(saved) : {};
  }
  
  saveWindowPositions() {
    localStorage.setItem('os-window-positions', JSON.stringify(this.windowPositions));
  }
  
  createWindow(id, title, content) {
    if (this.windows.has(id)) {
      this.bringToFront(id);
      return;
    }
    
    const window = document.createElement('div');
    window.className = 'os-window';
    window.id = `window-${id}`;
    window.style.zIndex = this.zIndex++;
    window.style.position = 'absolute';
    
    // Get saved position or center on screen
    const saved = this.windowPositions[id];
    if (saved) {
      window.style.left = saved.x + 'px';
      window.style.top = saved.y + 'px';
    } else {
      // Center window on screen
      const x = Math.max(50, (window.innerWidth - 500) / 2);
      const y = Math.max(100, (window.innerHeight - 400) / 2);
      window.style.left = x + 'px';
      window.style.top = y + 'px';
    }
    
    window.innerHTML = `
      <div class="window-titlebar">
        <div class="window-title">${title}</div>
        <button class="window-close-btn" data-window-id="${id}">✕</button>
      </div>
      <div class="window-content">
        ${content}
      </div>
    `;
    
    const container = document.getElementById('windows-container');
    container.appendChild(window);
    
    this.windows.set(id, { element: window, title });
    
    // Make window draggable
    this.makeWindowDraggable(window, id);
    
    // Close button
    window.querySelector('.window-close-btn').addEventListener('click', () => {
      this.closeWindow(id);
    });
    
    // Bring to front on click
    window.addEventListener('mousedown', () => {
      this.bringToFront(id);
    });
    
    this.updateTaskbar();
    return window;
  }
  
  makeWindowDraggable(windowEl, id) {
    let isDragging = false;
    let currentX = 0;
    let currentY = 0;
    let initialMouseX = 0;
    let initialMouseY = 0;
    
    const titlebar = windowEl.querySelector('.window-titlebar');
    
    titlebar.addEventListener('mousedown', (e) => {
      isDragging = true;
      initialMouseX = e.clientX;
      initialMouseY = e.clientY;
      currentX = windowEl.offsetLeft;
      currentY = windowEl.offsetTop;
      windowEl.classList.add('dragging');
    });
    
    document.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      
      const deltaX = e.clientX - initialMouseX;
      const deltaY = e.clientY - initialMouseY;
      
      windowEl.style.left = (currentX + deltaX) + 'px';
      windowEl.style.top = (currentY + deltaY) + 'px';
    });
    
    document.addEventListener('mouseup', () => {
      if (isDragging) {
        isDragging = false;
        windowEl.classList.remove('dragging');
        
        // Save position
        this.windowPositions[id] = {
          x: windowEl.offsetLeft,
          y: windowEl.offsetTop
        };
        this.saveWindowPositions();
      }
    });
  }
  
  bringToFront(id) {
    const windowEl = document.getElementById(`window-${id}`);
    if (windowEl) {
      windowEl.style.zIndex = this.zIndex++;
      this.updateTaskbar();
    }
  }
  
  closeWindow(id) {
    const windowEl = document.getElementById(`window-${id}`);
    if (windowEl) {
      windowEl.classList.add('closing');
      setTimeout(() => {
        windowEl.remove();
        this.windows.delete(id);
        delete this.windowPositions[id];
        this.saveWindowPositions();
        this.updateTaskbar();
      }, 300);
    }
  }
  
  updateTaskbar() {
    const taskbarWindows = document.getElementById('taskbar-windows');
    taskbarWindows.innerHTML = '';
    
    for (const [id, data] of this.windows) {
      const btn = document.createElement('button');
      btn.className = 'taskbar-window-btn';
      btn.textContent = data.title;
      btn.addEventListener('click', () => {
        this.bringToFront(id);
        const windowEl = document.getElementById(`window-${id}`);
        if (windowEl) windowEl.focus();
      });
      taskbarWindows.appendChild(btn);
    }
  }
}

const windowManager = new WindowManager();

// ===== RENDER DESKTOP ICONS =====
function renderDesktopIcons() {
  const container = document.getElementById('desktop-icons');
  
  desktopIcons.forEach(icon => {
    const iconEl = document.createElement('div');
    iconEl.className = 'desktop-icon';
    iconEl.style.left = icon.x + 'px';
    iconEl.style.top = icon.y + 'px';
    iconEl.innerHTML = `
      <div class="desktop-icon-visual">
        ${svgIcons[icon.icon]}
      </div>
      <div class="desktop-icon-label">${icon.label}</div>
    `;
    
    // Double-click to open
    iconEl.addEventListener('dblclick', () => {
      openDesktopItem(icon.id, icon.label);
    });
    
    container.appendChild(iconEl);
  });
}

// ===== OPEN DESKTOP ITEMS =====
function openDesktopItem(id, label) {
  let content = '';
  let title = '';
  
  switch(id) {
    case 'home':
      title = '~/';
      content = `
        <div class="file-browser">
          <div class="file-item">
            <span class="file-icon">📁</span>
            <span>Documents</span>
          </div>
          <div class="file-item">
            <span class="file-icon">📁</span>
            <span>Projects</span>
          </div>
        </div>
      `;
      break;
      
    case 'blog':
      title = '~/Blog Posts';
      content = `<div class="file-browser" id="blog-content"></div>`;
      break;
      
    case 'projects':
      title = '~/Projects';
      content = `<div class="file-browser" id="projects-content"></div>`;
      break;
      
    case 'about':
      title = '~/About';
      content = `<div class="file-browser"><div class="file-item">About Me - Cybersecurity Researcher</div></div>`;
      break;
      
    case 'research':
      title = '~/Research';
      content = `<div class="file-browser"><div class="file-item">Research Papers & Analysis</div></div>`;
      break;
      
    case 'gallery':
      title = '~/Gallery';
      content = `<div class="file-browser"><div class="file-item">Photo Gallery & Media</div></div>`;
      break;
  }
  
  windowManager.createWindow(id, title, content);
}

// ===== TASKBAR CLOCK =====
function updateClock() {
  const now = new Date();
  const timeStr = now.toLocaleTimeString();
  document.getElementById('taskbar-clock').textContent = timeStr;
}

setInterval(updateClock, 1000);
updateClock();

// ===== TERMINAL COMMAND INPUT =====
const terminalInput = document.getElementById('terminal-command-input');
const terminalPath = document.getElementById('terminal-path');

terminalInput.addEventListener('keypress', (e) => {
  if (e.key === 'Enter') {
    const command = terminalInput.value.trim();
    console.log('Terminal command:', command);
    terminalInput.value = '';
    
    // Parse commands like "open blog", "cd projects", etc
    const parts = command.split(' ');
    const cmd = parts[0];
    const arg = parts[1];
    
    if (cmd === 'open' && arg) {
      const iconId = arg.toLowerCase();
      const icon = desktopIcons.find(i => i.id === iconId);
      if (icon) {
        openDesktopItem(icon.id, icon.label);
      }
    }
  }
});

// Initialize desktop on page load
window.addEventListener('load', () => {
  setTimeout(() => {
    renderDesktopIcons();
  }, 500);
});
</script>
